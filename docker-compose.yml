version: '3.8'

services:
  # PHP application server
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: comparecore-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis
    networks:
      - comparecore-network

  # Nginx web server
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - comparecore-network

  # Database (PostgreSQL)
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-comparecore}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - comparecore-network

  # Cache & Queue (Redis)
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - comparecore-network

  # Search Engine (Meilisearch)
  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
    volumes:
      - meilidata:/meili_data
    networks:
      - comparecore-network

  # Mail catcher (Mailpit)
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - comparecore-network

networks:
  comparecore-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  meilidata:
    driver: local
